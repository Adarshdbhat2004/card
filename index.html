<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Multiplayer Card Game</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
    --primary:#1f2937;
    --secondary:#111827;
    --gold:#facc15;
    --green:#22c55e;
    --red:#ef4444;
    --blue:#3b82f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:var(--primary);
    color:white;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    background:var(--secondary);
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid var(--blue);
}

.score-box{
    text-align:center;
}

.score{
    color:var(--gold);
    font-size:22px;
    font-weight:bold;
}

#status{
    text-align:center;
    padding:10px;
    background:#0f172a;
    color:var(--gold);
    font-weight:bold;
}

#game-board{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:10px;
}

.hand{
    min-height:130px;
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:10px;
}

#table{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
}

.slot{
    width:90px;
    height:130px;
    border:2px dashed rgba(255,255,255,0.2);
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:80px;
    height:120px;
    background:white;
    border-radius:10px;
    color:black;
    padding:8px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

.red{
    color:red;
}

.center{
    text-align:center;
    font-size:28px;
}

.bottom{
    transform:rotate(180deg);
}

.disabled{
    opacity:0.4;
    pointer-events:none;
}

.controls{
    padding:15px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.join{
    background:var(--blue);
    color:white;
}

.start{
    background:var(--green);
    color:white;
}

.reset{
    background:var(--red);
    color:white;
}

#trump{
    font-size:28px;
}
</style>
</head>

<body>

<div class="header">
    <div class="score-box">
        P1
        <div class="score" id="scoreP1">0</div>
    </div>

    <div id="trump">🃏</div>

    <div class="score-box">
        P2
        <div class="score" id="scoreP2">0</div>
    </div>
</div>

<div id="status">Connecting...</div>

<div id="game-board">

    <div class="hand" id="p2-hand"></div>

    <div id="table">
        <div class="slot" id="p2-slot"></div>
        <div class="slot" id="p1-slot"></div>
    </div>

    <div class="hand" id="p1-hand"></div>

</div>

<div class="controls">
    <button class="join" onclick="joinGame('P1')">Join Player 1</button>
    <button class="join" onclick="joinGame('P2')">Join Player 2</button>

    <button class="start" onclick="startGame()">Start Match</button>

    <button class="reset" onclick="resetGame()">Reset</button>
</div>

<script>

const SUPABASE_URL = "https://pftbngrjxxkasossvhwm.supabase.co";

const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const ROOM_ID = "global-room";

let myPlayer = null;

const suits = [
    {symbol:'♠',color:'black'},
    {symbol:'♣',color:'black'},
    {symbol:'♥',color:'red'},
    {symbol:'♦',color:'red'}
];

const values = ['7','8','9','10','J','Q','K','A'];

let deck = [];

let gameState = {
    player1Hand: [],
    player2Hand: [],
    table: {
        P1:null,
        P2:null
    },
    scores:{
        P1:0,
        P2:0
    },
    turn:"P1",
    trump:"♠"
};

async function createRoom(){

    const {data} = await client
        .from("game_rooms")
        .select("*")
        .eq("id",ROOM_ID)
        .single();

    if(!data){

        await client.from("game_rooms").insert({
            id:ROOM_ID,
            game_state:gameState
        });

    }

}

async function loadGame(){

    const {data} = await client
        .from("game_rooms")
        .select("*")
        .eq("id",ROOM_ID)
        .single();

    if(data){

        gameState = data.game_state;

        renderGame();

    }

}

async function saveGame(){

    await client
        .from("game_rooms")
        .update({
            game_state:gameState,
            updated_at:new Date()
        })
        .eq("id",ROOM_ID);

}

function subscribeRealtime(){

    client.channel("live-room")

    .on(
        "postgres_changes",
        {
            event:"UPDATE",
            schema:"public",
            table:"game_rooms"
        },

        payload=>{

            gameState = payload.new.game_state;

            renderGame();

        }

    )

    .subscribe();

}

function joinGame(player){

    myPlayer = player;

    updateStatus("You joined as " + player);

    renderGame();

}

function generateDeck(){

    deck = [];

    suits.forEach(s=>{

        values.forEach(v=>{

            deck.push({
                val:v,
                suit:s.symbol,
                color:s.color
            });

        });

    });

    for(let i=deck.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [deck[i],deck[j]]=[deck[j],deck[i]];

    }

}

async function startGame(){

    generateDeck();

    gameState.player1Hand = deck.splice(0,8);

    gameState.player2Hand = deck.splice(0,8);

    gameState.turn = "P1";

    gameState.table = {
        P1:null,
        P2:null
    };

    gameState.scores = {
        P1:0,
        P2:0
    };

    const randomSuit =
        suits[Math.floor(Math.random()*4)];

    gameState.trump = randomSuit.symbol;

    await saveGame();

    renderGame();

}

async function playCard(player,index){

    if(player !== myPlayer) return;

    if(gameState.turn !== player) return;

    let hand =
        player==="P1"
        ? gameState.player1Hand
        : gameState.player2Hand;

    const played = hand.splice(index,1)[0];

    gameState.table[player] = played;

    gameState.turn =
        player==="P1"
        ? "P2"
        : "P1";

    if(gameState.table.P1 && gameState.table.P2){

        setTimeout(async()=>{

            resolveRound();

            await saveGame();

            renderGame();

        },800);

    }

    await saveGame();

    renderGame();

}

function resolveRound(){

    const winner =
        Math.random()>0.5
        ? "P1"
        : "P2";

    gameState.scores[winner]++;

    gameState.turn = winner;

    gameState.table = {
        P1:null,
        P2:null
    };

    if(
        gameState.player1Hand.length===0 &&
        gameState.player2Hand.length===0
    ){

        let msg = "";

        if(gameState.scores.P1 > gameState.scores.P2){

            msg = "Player 1 Wins";

        }else if(gameState.scores.P2 > gameState.scores.P1){

            msg = "Player 2 Wins";

        }else{

            msg = "Match Draw";

        }

        updateStatus(msg);

    }

}

function renderGame(){

    renderHand(
        "p1-hand",
        gameState.player1Hand,
        "P1"
    );

    renderHand(
        "p2-hand",
        gameState.player2Hand,
        "P2"
    );

    renderTable();

    document.getElementById("scoreP1").innerText =
        gameState.scores.P1;

    document.getElementById("scoreP2").innerText =
        gameState.scores.P2;

    document.getElementById("trump").innerText =
        gameState.trump;

    updateStatus(
        gameState.turn + "'s turn"
    );

}

function renderHand(container,hand,player){

    const box = document.getElementById(container);

    box.innerHTML = "";

    hand.forEach((card,index)=>{

        const div = document.createElement("div");

        div.className = "card " + card.color;

        if(player !== myPlayer){

            div.classList.add("disabled");

        }

        div.innerHTML = `
            <div>${card.val}</div>
            <div class="center">${card.suit}</div>
            <div class="bottom">${card.val}</div>
        `;

        div.onclick = ()=>playCard(player,index);

        box.appendChild(div);

    });

}

function renderTable(){

    document.getElementById("p1-slot").innerHTML = "";

    document.getElementById("p2-slot").innerHTML = "";

    if(gameState.table.P1){

        showTableCard(
            "p1-slot",
            gameState.table.P1
        );

    }

    if(gameState.table.P2){

        showTableCard(
            "p2-slot",
            gameState.table.P2
        );

    }

}

function showTableCard(slot,card){

    const div = document.createElement("div");

    div.className = "card " + card.color;

    div.innerHTML = `
        <div>${card.val}</div>
        <div class="center">${card.suit}</div>
        <div class="bottom">${card.val}</div>
    `;

    document.getElementById(slot).appendChild(div);

}

async function resetGame(){

    gameState = {
        player1Hand: [],
        player2Hand: [],
        table:{
            P1:null,
            P2:null
        },
        scores:{
            P1:0,
            P2:0
        },
        turn:"P1",
        trump:"🃏"
    };

    await saveGame();

    renderGame();

}

function updateStatus(text){

    document.getElementById("status").innerText = text;

}

createRoom();

subscribeRealtime();

loadGame();

</script>

</body>
</html>
