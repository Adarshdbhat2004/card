<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Card Game</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#1a252f;
    color:white;
}

#setup-screen{
    position:fixed;
    inset:0;
    background:#1a252f;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
    z-index: 100;
}

.btn{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.btn-green { background:#2ecc71; color:white; }
.btn-blue { background:#3498db; color:white; }
.btn-orange { background:#e67e22; color:white; }
.btn-red { background:#e74c3c; color:white; }
.btn:disabled { background: #7f8c8d; cursor: not-allowed; }

#room-url-input{
    width:300px;
    padding:10px;
}

#main-container{
    display:flex;
    flex-direction:column;
    padding:10px;
    max-width: 800px;
    margin: 0 auto;
}

.panel{
    background:#34495e;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

.scoreboard {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #2c3e50;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
}

.hand-container{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
    min-height: 100px;
    align-items: center;
}

.card{
    width:60px;
    height:90px;
    background:white;
    color:black;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
    font-weight:bold;
    user-select: none;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    border: 2px solid transparent;
}
.card.back {
    background: #2c3e50;
    color: #ecf0f1;
    border: 2px solid #bdc3c7;
}
.card:hover:not(.back) {
    transform: translateY(-5px);
}

.red{ color:red; }
.black{ color:black; }

#chat-messages{
    height:120px;
    overflow:auto;
    background:#2c3e50;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.msg{ margin-bottom:8px; }
#chat-input{ width:70%; padding:10px; }

#status-text{ color:yellow; font-weight: bold; }
#action-panel { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }

#table{
    display:flex;
    justify-content:center;
    gap:40px;
    margin:20px 0;
    background: #27ae60;
    padding: 20px;
    border-radius: 15px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
}

.slot-wrapper {
    text-align: center;
}

.slot{
    width:70px;
    height:100px;
    border:2px dashed white;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    margin-top: 5px;
}
</style>
</head>

<body>

<div id="setup-screen">
    <h1>Multiplayer Card Game</h1>
    <button id="btn-create-room" class="btn btn-green">Create Room</button>
    <div id="share-link-box" style="display:none; text-align:center;">
        <input type="text" id="room-url-input" readonly><br><br>
        <button id="btn-copy-link" class="btn btn-blue">Copy Link</button>
    </div>
    <div id="waiting-msg" style="display:none; color: #f1c40f;">Waiting for Player 2 to join...</div>
</div>

<div id="main-container">

    <div class="panel scoreboard">
        <div>Role: <span id="role-text" style="color:#3498db;">-</span></div>
        <div>Trump Suit: <span id="trump-text" style="color:#e74c3c;">?</span></div>
        <div>Score: P1 [<span id="p1-score">0</span>] - P2 [<span id="p2-score">0</span>]</div>
    </div>

    <div class="panel">
        <div id="status-text">Connecting to real-time engine...</div>
        <div id="action-panel"></div>
    </div>

    <div class="panel">
        <h3>Opponent's Hand (Fog of War)</h3>
        <div id="opp-hand" class="hand-container"></div>
    </div>

    <div id="table">
        <div class="slot-wrapper">
            <h4>Opponent</h4>
            <div class="slot" id="opp-slot"></div>
        </div>
        <div class="slot-wrapper">
            <h4>You</h4>
            <div class="slot" id="my-slot"></div>
        </div>
    </div>

    <div class="panel">
        <h3>Your Cards</h3>
        <div id="my-hand" class="hand-container"></div>
    </div>

    <div class="panel">
        <h3>Chat</h3>
        <div id="chat-messages"></div>
        <div style="margin-top:10px;">
            <input type="text" id="chat-input" placeholder="Type a message...">
            <button id="chat-send" class="btn btn-blue">Send</button>
        </div>
    </div>

</div>

<script>
/* =========================
   SUPABASE CONNECTION
========================= */
const SUPABASE_URL = "https://pftbngrjxxkasossvhwm.supabase.co";
const SUPABASE_KEY = "sb_publishable_EmdkxXEgX5XYcvPnKZjdMA_Ff8G9PdC";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   GAME VARIABLES
========================= */
const suits = ['♠','♣','♥','♦'];
const values = ['7','8','9','10','J','Q','K','A'];
const suitColors = { '♠':'black', '♣':'black', '♥':'red', '♦':'red' };

let roomID = new URLSearchParams(window.location.search).get('room');
let myRole = '';
let channel = null;

// Game Engine State
let fullDeck = [];
let myHand = [];
let oppHandCount = 0;
let trumpSuit = null;
let trumpRevealed = false;
let scores = { P1: 0, P2: 0 };
let roundsPlayed = 0;

let tableCards = { P1: null, P2: null };
let currentTurn = null; 

// Phase Management and Multi-User Votes
let gameState = 'WAITING_FOR_PLAYERS'; 
let votes = {
    trumpChooser: { P1: null, P2: null },
    turnSync: { P1: null, P2: null },
    trickWinner: { P1: null, P2: null }
};

window.addEventListener('DOMContentLoaded', () => {
    if(roomID){
        myRole = 'P2';
        document.getElementById('role-text').innerText = "Player 2";
        document.getElementById('btn-create-room').style.display = 'none';
        initRealtimeEngine();
    } else {
        document.getElementById('btn-create-room').addEventListener('click', generateRoom);
    }
    document.getElementById('btn-copy-link').addEventListener('click', copyRoomLink);
    document.getElementById('chat-send').addEventListener('click', sendChat);
    document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChat(); });
});

function generateRoom(){
    roomID = Math.random().toString(36).substring(2,9);
    myRole = 'P1';
    document.getElementById('role-text').innerText = "Player 1";
    
    const link = window.location.origin + window.location.pathname + '?room=' + roomID;
    document.getElementById('room-url-input').value = link;
    document.getElementById('share-link-box').style.display = 'block';
    document.getElementById('btn-create-room').style.display = 'none';
    document.getElementById('waiting-msg').style.display = 'block';
    
    initRealtimeEngine();
}

function copyRoomLink(){
    const input = document.getElementById('room-url-input');
    input.select();
    document.execCommand('copy');
    alert("Room URL Copied!");
}

/* =========================
   REALTIME ENGINE & RESILIENT SYNC
========================= */
function initRealtimeEngine(){
    channel = client.channel(`room-${roomID}`, {
        config: {
            broadcast: { ack: false, self: false }
        }
    });

    channel
    .on('broadcast', {event: 'join'}, () => {
        addChat("System", "An opponent has entered the room!");
        if(myRole === 'P1' && gameState === 'WAITING_FOR_PLAYERS') {
            gameState = 'ROOM_READY';
            updateUIStatus();
            channel.send({ type: 'broadcast', event: 'host-acknowledge', payload: {} });
        }
    })
    .on('broadcast', {event: 'host-acknowledge'}, () => {
        if(myRole === 'P2' && gameState === 'WAITING_FOR_HOST') {
            addChat("System", "Connected to Host successfully!");
        }
    })
    .on('broadcast', {event: 'deal-part1'}, ({payload}) => {
        myHand = myRole === 'P1' ? payload.p1Hand : payload.p2Hand;
        oppHandCount = 4;
        gameState = 'TRUMP_VOTING';
        clearVotes();
        renderHand();
        renderOpponentHand();
        updateUIStatus();
        document.getElementById('setup-screen').style.display = 'none';
    })
    .on('broadcast', {event: 'vote-trump-chooser'}, ({payload}) => {
        votes.trumpChooser[payload.player] = payload.vote;
        evaluateTrumpChooserVote();
    })
    .on('broadcast', {event: 'trump-selected'}, ({payload}) => {
        trumpSuit = payload.suit;
        gameState = 'DEAL_PART_2';
        updateUIStatus();
        if(myRole === 'P1') {
            executeDealPart2();
        }
    })
    .on('broadcast', {event: 'deal-part2'}, ({payload}) => {
        const extraCards = myRole === 'P1' ? payload.p1HandPart2 : payload.p2HandPart2;
        myHand = myHand.concat(extraCards);
        oppHandCount = 8;
        gameState = 'TURN_SYNC_VOTING';
        clearVotes();
        renderHand();
        renderOpponentHand();
        updateUIStatus();
    })
    .on('broadcast', {event: 'vote-turn-sync'}, ({payload}) => {
        votes.turnSync[payload.player] = payload.vote;
        evaluateTurnSyncVote();
    })
    .on('broadcast', {event: 'play-card'}, ({payload}) => {
        tableCards[payload.player] = payload.card;
        
        if(!trumpRevealed) {
            trumpRevealed = true;
            document.getElementById('trump-text').innerText = trumpSuit;
            addChat("System", `The Trump Suit has been officially revealed as ${trumpSuit}!`);
        }

        if(payload.player !== myRole) {
            oppHandCount--;
            renderOpponentHand();
        }

        renderTable();
        
        if(tableCards.P1 && tableCards.P2) {
            gameState = 'TRICK_WINNER_VOTING';
            clearVotes();
        } else {
            currentTurn = myRole === 'P1' ? 'P2' : 'P1';
        }
        updateUIStatus();
    })
    .on('broadcast', {event: 'vote-trick-winner'}, ({payload}) => {
        votes.trickWinner[payload.player] = payload.vote;
        evaluateTrickWinnerVote();
    })
    .on('broadcast', {event: 'match-reset'}, () => {
        resetMatchState();
    })
    .on('broadcast', {event: 'chat'}, ({payload}) => {
        addChat(payload.name, payload.msg);
    })
    .subscribe((status) => {
        console.log("Supabase Channel Status:", status);
        
        if(status === 'SUBSCRIBED'){
            document.getElementById('status-text').innerText = "Connected to Server.";
            
            if(myRole === 'P2'){
                setTimeout(() => {
                    channel.send({
                        type: 'broadcast',
                        event: 'join',
                        payload: {}
                    });
                }, 300);
                
                document.getElementById('setup-screen').style.display = 'none';
                gameState = 'WAITING_FOR_HOST';
                updateUIStatus();
            } else {
                updateUIStatus();
            }
        }
    });
}

/* =========================
   PHASE WORKFLOWS & ENGINE
========================= */
function updateUIStatus() {
    const statusText = document.getElementById('status-text');
    const actionPanel = document.getElementById('action-panel');
    actionPanel.innerHTML = '';

    switch(gameState) {
        case 'WAITING_FOR_PLAYERS':
            statusText.innerText = "Room Created. Send the URL link to Player 2.";
            break;
        case 'ROOM_READY':
            statusText.innerText = "Player 2 Connected! Ready to begin.";
            if(myRole === 'P1') {
                const btn = createActionButton("Start Match", "btn-green", () => executeDealPart1());
                actionPanel.appendChild(btn);
            }
            break;
        case 'WAITING_FOR_HOST':
            statusText.innerText = "Waiting for Host (Player 1) to start match...";
            break;
        case 'TRUMP_VOTING':
            statusText.innerText = "Phase 1: Vote on who should secretly choose the Trump Suit.";
            const vP1 = createActionButton("Vote Player 1", "btn-blue", () => sendVote('vote-trump-chooser', 'P1'));
            const vP2 = createActionButton("Vote Player 2", "btn-blue", () => sendVote('vote-trump-chooser', 'P2'));
            if(votes.trumpChooser[myRole] !== null) {
                vP1.disabled = true; vP2.disabled = true;
                statusText.innerText = "Waiting for opponent's choice vote...";
            }
            actionPanel.appendChild(vP1);
            actionPanel.appendChild(vP2);
            break;
        case 'SELECTING_TRUMP':
            statusText.innerText = "You were chosen! Select the hidden Trump Suit:";
            suits.forEach(s => {
                const sBtn = createActionButton(s, s==='♥'||s==='♦'?'btn-red':'btn-blue', () => selectTrumpSuit(s));
                actionPanel.appendChild(sBtn);
            });
            break;
        case 'WAITING_TRUMP_SELECTION':
            statusText.innerText = "Opponent is secretly choosing the Trump Suit...";
            break;
        case 'TURN_SYNC_VOTING':
            statusText.innerText = "Phase 2: Vote and agree on who throws the first opening card.";
            const tP1 = createActionButton("Vote Player 1 Starts", "btn-blue", () => sendVote('vote-turn-sync', 'P1'));
            const tP2 = createActionButton("Vote Player 2 Starts", "btn-blue", () => sendVote('vote-turn-sync', 'P2'));
            if(votes.turnSync[myRole] !== null) {
                tP1.disabled = true; tP2.disabled = true;
                statusText.innerText = "Waiting for starter consensus...";
            }
            actionPanel.appendChild(tP1);
            actionPanel.appendChild(tP2);
            break;
        case 'PLAYING':
            if(currentTurn === myRole) {
                statusText.innerText = "Your Turn! Select a card from your hand to throw down.";
            } else {
                statusText.innerText = "Opponent's Turn. Waiting for them to throw down a card...";
            }
            break;
        case 'TRICK_WINNER_VOTING':
            statusText.innerText = "Phase 3: Evaluate tricks manual consensus. Who won this round?";
            const wP1 = createActionButton("Player 1 Won", "btn-orange", () => sendVote('vote-trick-winner', 'P1'));
            const wP2 = createActionButton("Player 2 Won", "btn-orange", () => sendVote('vote-trick-winner', 'P2'));
            const wDraw = createActionButton("Draw / Tie", "btn-blue", () => sendVote('vote-trick-winner', 'Draw'));
            if(votes.trickWinner[myRole] !== null) {
                wP1.disabled = true; wP2.disabled = true; wDraw.disabled = true;
                statusText.innerText = "Waiting for confirmation pairing match from opponent...";
            }
            actionPanel.appendChild(wP1);
            actionPanel.appendChild(wP2);
            actionPanel.appendChild(wDraw);
            break;
        case 'MATCH_OVER':
            let winnerText = "It's a Draw!";
            if(scores.P1 > scores.P2) winnerText = "Player 1 Wins the Match!";
            if(scores.P2 > scores.P1) winnerText = "Player 2 Wins the Match!";
            statusText.innerText = `Match Ended! ${winnerText}`;
            if(myRole === 'P1') {
                const resetBtn = createActionButton("Start New Match", "btn-green", () => {
                    channel.send({ type: 'broadcast', event: 'match-reset', payload: {} });
                    resetMatchState();
                });
                actionPanel.appendChild(resetBtn);
            }
            break;
    }
}

function createActionButton(text, className, onClick) {
    const btn = document.createElement('button');
    btn.className = `btn ${className}`;
    btn.innerText = text;
    btn.onclick = onClick;
    return btn;
}

function clearVotes() {
    votes.trumpChooser = { P1: null, P2: null };
    votes.turnSync = { P1: null, P2: null };
    votes.trickWinner = { P1: null, P2: null };
}

/* PHASE 1: DEAL & ELECT */
function buildDeck() {
    let d = [];
    suits.forEach(s => {
        values.forEach(v => {
            d.push({ value: v, suit: s, color: suitColors[s] });
        });
    });
    return d.sort(() => Math.random() - 0.5);
}

function executeDealPart1() {
    fullDeck = buildDeck();
    const p1Hand = fullDeck.slice(0, 4);
    const p2Hand = fullDeck.slice(4, 8);

    channel.send({
        type: 'broadcast',
        event: 'deal-part1',
        payload: { p1Hand, p2Hand }
    });
}

function sendVote(eventName, selection) {
    channel.send({
        type: 'broadcast',
        event: eventName,
        payload: { player: myRole, vote: selection }
    });
}

function evaluateTrumpChooserVote() {
    if(votes.trumpChooser.P1 && votes.trumpChooser.P2) {
        if(votes.trumpChooser.P1 === votes.trumpChooser.P2) {
            const chosenSelector = votes.trumpChooser.P1;
            addChat("System", `${chosenSelector} was elected to choose the Trump suit.`);
            if(myRole === chosenSelector) {
                gameState = 'SELECTING_TRUMP';
            } else {
                gameState = 'WAITING_TRUMP_SELECTION';
            }
        } else {
            addChat("System", "Votes mismatched. Re-voting required.");
            clearVotes();
            gameState = 'TRUMP_VOTING';
        }
        updateUIStatus();
    }
}

function selectTrumpSuit(selectedSuit) {
    channel.send({
        type: 'broadcast',
        event: 'trump-selected',
        payload: { suit: selectedSuit }
    });
}

function executeDealPart2() {
    const p1HandPart2 = fullDeck.slice(8, 12);
    const p2HandPart2 = fullDeck.slice(12, 16);

    channel.send({
        type: 'broadcast',
        event: 'deal-part2',
        payload: { p1HandPart2, p2HandPart2 }
    });
}

/* PHASE 2: TURN CONSENSUS & GAMEPLAY LOOP */
function evaluateTurnSyncVote() {
    if(votes.turnSync.P1 && votes.turnSync.P2) {
        if(votes.turnSync.P1 === votes.turnSync.P2) {
            currentTurn = votes.turnSync.P1;
            addChat("System", `${currentTurn} will make the opening throw.`);
            gameState = 'PLAYING';
        } else {
            addChat("System", "Consensus not met on who goes first. Re-voting.");
            clearVotes();
            gameState = 'TURN_SYNC_VOTING';
        }
        updateUIStatus();
    }
}

function playCard(index) {
    if(gameState !== 'PLAYING' || currentTurn !== myRole) return;
    if(tableCards[myRole] !== null) return;

    const card = myHand.splice(index, 1)[0];
    tableCards[myRole] = card;
    renderHand();
    renderTable();

    channel.send({
        type: 'broadcast',
        event: 'play-card',
        payload: { player: myRole, card: card }
    });
}

/* PHASE 3: MANUAL VERIFICATION */
function evaluateTrickWinnerVote() {
    if(votes.trickWinner.P1 && votes.trickWinner.P2) {
        if(votes.trickWinner.P1 === votes.trickWinner.P2) {
            const winner = votes.trickWinner.P1;
            if(winner !== 'Draw') {
                scores[winner]++;
                document.getElementById('p1-score').innerText = scores.P1;
                document.getElementById('p2-score').innerText = scores.P2;
                addChat("System", `${winner} won this round's point!`);
                currentTurn = winner; 
            } else {
                addChat("System", "This round ended in an accepted Draw.");
            }

            roundsPlayed++;
            tableCards = { P1: null, P2: null };
            
            setTimeout(() => {
                renderTable();
                if(roundsPlayed >= 8) {
                    gameState = 'MATCH_OVER';
                } else {
                    gameState = 'PLAYING';
                }
                updateUIStatus();
            }, 1500);

        } else {
            addChat("System", "Warning: Dispute! Verified trick choices did not match. Please re-vote.");
            clearVotes();
            gameState = 'TRICK_WINNER_VOTING';
            updateUIStatus();
        }
    }
}

function resetMatchState() {
    fullDeck = [];
    myHand = [];
    oppHandCount = 0;
    trumpSuit = null;
    trumpRevealed = false;
    scores = { P1: 0, P2: 0 };
    roundsPlayed = 0;
    tableCards = { P1: null, P2: null };
    currentTurn = null;
    clearVotes();

    document.getElementById('trump-text').innerText = "?";
    document.getElementById('p1-score').innerText = "0";
    document.getElementById('p2-score').innerText = "0";
    document.getElementById('my-slot').innerHTML = '';
    document.getElementById('opp-slot').innerHTML = '';
    
    gameState = (myRole === 'P1') ? 'ROOM_READY' : 'WAITING_FOR_HOST';
    renderHand();
    renderOpponentHand();
    updateUIStatus();
}

/* =========================
   RENDERING & UTILITIES
========================= */
function renderHand(){
    const container = document.getElementById('my-hand');
    container.innerHTML = '';
    myHand.forEach((card, index) => {
        const div = document.createElement('div');
        div.className = `card ${card.color}`;
        div.innerHTML = `${card.value}${card.suit}`;
        div.onclick = () => playCard(index);
        container.appendChild(div);
    });
}

function renderOpponentHand() {
    const container = document.getElementById('opp-hand');
    container.innerHTML = '';
    for(let i=0; i < oppHandCount; i++) {
        const div = document.createElement('div');
        div.className = "card back";
        div.innerText = "?";
        container.appendChild(div);
    }
}

function renderTable(){
    document.getElementById('my-slot').innerHTML = '';
    document.getElementById('opp-slot').innerHTML = '';

    if(tableCards[myRole]){
        const div = document.createElement('div');
        div.className = `card ${tableCards[myRole].color}`;
        div.innerHTML = `${tableCards[myRole].value}${tableCards[myRole].suit}`;
        document.getElementById('my-slot').appendChild(div);
    }

    const oppRole = (myRole === 'P1') ? 'P2' : 'P1';
    if(tableCards[oppRole]){
        const div = document.createElement('div');
        div.className = `card ${tableCards[oppRole].color}`;
        div.innerHTML = `${tableCards[oppRole].value}${tableCards[oppRole].suit}`;
        document.getElementById('opp-slot').appendChild(div);
    }
}

/* =========================
   CHAT INFRASTRUCTURE
========================= */
function sendChat(){
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if(!msg) return;

    addChat('You', msg);

    channel.send({
        type: 'broadcast',
        event: 'chat',
        payload: { name: myRole, msg: msg }
    });
    input.value = '';
}

function addChat(name, msg){
    const div = document.createElement('div');
    div.className = 'msg';
    div.innerHTML = `<b>${name}:</b> ${msg}`;
    const box = document.getElementById('chat-messages');
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
