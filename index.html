<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tulasi Online Cards</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0f172a; --gold: #fbbf24; --blue: #3b82f6; --red: #ef4444; --green: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--primary); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .game-header { padding: 12px; background: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); }
        .status-bar { background: var(--blue); color: #fff; font-size: 13px; text-align: center; padding: 6px; font-weight: 600; }
        
        #game-world { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; }
        .hand { display: flex; justify-content: center; gap: 6px; min-height: 100px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        #table { flex: 1; margin: 15px 0; border: 2px dashed #334155; border-radius: 20px; display: flex; justify-content: center; align-items: center; gap: 20px; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; text-align: center; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 8px; width: 240px; font-size: 16px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-suit { width: 65px; height: 65px; font-size: 28px; background: white; color: black; margin: 5px; }

        #chat-float { position: fixed; bottom: 120px; right: 20px; background: var(--blue); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <div class="game-header">
        <div id="p1-score">P1: 0</div>
        <div id="trump-val" style="font-size: 24px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 15px;">🃏</div>
        <div id="p2-score">P2: 0</div>
    </div>
    <div class="status-bar" id="status">Setup Required</div>

    <div id="game-world">
        <div class="hand" id="opp-hand"></div>
        <div id="table">
            <div id="slot-p2" class="play-slot"></div>
            <div id="slot-p1" class="play-slot"></div>
        </div>
        <div class="hand" id="my-hand"></div>
    </div>

    <div id="overlay-init" class="overlay">
        <h1 style="color:var(--gold); margin-bottom: 10px;">Tulasi Cards</h1>
        <div id="create-view">
            <button class="btn btn-gold" onclick="initRoom()">CREATE PRIVATE GAME</button>
        </div>
        <div id="share-view" style="display:none;">
            <p style="margin-bottom:10px;">Room ID: <span id="room-id-display" style="color:var(--gold); font-weight:bold;"></span></p>
            <button class="btn btn-wa" onclick="shareWhatsApp()">SHARE ON WHATSAPP</button>
            <hr style="width: 100%; border: 0.5px solid #333; margin: 20px 0;">
            <p>Select your side:</p>
            <button class="btn btn-blue" onclick="joinRole(1)">PLAYER 1</button>
            <button class="btn btn-blue" onclick="joinRole(2)">PLAYER 2</button>
        </div>
    </div>

    <div id="overlay-vote-decider" class="overlay" style="display:none;">
        <h2>Who chooses Trump?</h2>
        <p style="margin-bottom:20px; font-size:14px; color:#94a3b8;">Both must pick the same player</p>
        <button class="btn btn-gold" onclick="castDeciderVote('P1')">VOTE PLAYER 1</button>
        <button class="btn btn-gold" onclick="castDeciderVote('P2')">VOTE PLAYER 2</button>
        <p id="vote-feedback" style="margin-top:20px; color:var(--gold); font-weight:bold;"></p>
    </div>

    <div id="overlay-pick-trump" class="overlay" style="display:none;">
        <h2 id="picker-title">Select Trump Suit</h2>
        <p style="margin-bottom:20px;">The opponent is waiting for your choice...</p>
        <div style="display:flex; flex-wrap: wrap; justify-content:center;">
            <button class="btn btn-suit" onclick="finalizeTrump('♠')">♠</button>
            <button class="btn btn-suit" onclick="finalizeTrump('♣')">♣</button>
            <button class="btn btn-suit" onclick="finalizeTrump('♥')" style="color:var(--red)">♥</button>
            <button class="btn btn-suit" onclick="finalizeTrump('♦')" style="color:var(--red)">♦</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://pftbngrjxxkasossvhwm.supabase.co';
        const supabaseKey = 'sb_publishable_EmdkxXEgX5XYcvPnKZjdMA_Ff8G9PdC';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let roomID = new URLSearchParams(window.location.search).get('room');
        let myRole = null; 
        let deciderVotes = { P1: null, P2: null };
        let channel;

        window.onload = () => {
            if(roomID) {
                document.getElementById('create-view').style.display = 'none';
                document.getElementById('share-view').style.display = 'block';
                document.getElementById('room-id-display').innerText = roomID;
            }
        };

        function initRoom() {
            roomID = Math.floor(1000 + Math.random() * 9000);
            const newUrl = window.location.origin + window.location.pathname + '?room=' + roomID;
            window.history.pushState({}, '', newUrl);
            document.getElementById('create-view').style.display = 'none';
            document.getElementById('share-view').style.display = 'block';
            document.getElementById('room-id-display').innerText = roomID;
        }

        function shareWhatsApp() {
            const link = window.location.href;
            window.open(`https://wa.me/?text=${encodeURIComponent("Join my card game: " + link)}`, '_blank');
        }

        function joinRole(num) {
            myRole = `P${num}`;
            document.getElementById('overlay-init').style.display = 'none';
            document.getElementById('overlay-vote-decider').style.display = 'flex';
            connectRealtime();
        }

        function connectRealtime() {
            channel = client.channel(`gameroom_${roomID}`);
            channel.on('broadcast', { event: 'decider_vote' }, ({ payload }) => {
                deciderVotes[payload.from] = payload.vote;
                processDecider();
            }).on('broadcast', { event: 'trump_selected' }, ({ payload }) => {
                applyTrump(payload.suit);
            }).subscribe();
        }

        function castDeciderVote(target) {
            deciderVotes[myRole] = target;
            channel.send({ type: 'broadcast', event: 'decider_vote', payload: { from: myRole, vote: target } });
            processDecider();
        }

        function processDecider() {
            const fb = document.getElementById('vote-feedback');
            if (deciderVotes.P1 && deciderVotes.P2) {
                if (deciderVotes.P1 === deciderVotes.P2) {
                    const winner = deciderVotes.P1;
                    document.getElementById('overlay-vote-decider').style.display = 'none';
                    
                    if (myRole === winner) {
                        document.getElementById('overlay-pick-trump').style.display = 'flex';
                    } else {
                        document.getElementById('status').innerText = `Waiting for ${winner} to pick Trump...`;
                    }
                } else {
                    fb.innerText = "Votes Mismatch! Try again.";
                    deciderVotes = { P1: null, P2: null };
                }
            } else {
                fb.innerText = "Waiting for other player's vote...";
            }
        }

        function finalizeTrump(suit) {
            channel.send({ type: 'broadcast', event: 'trump_selected', payload: { suit: suit } });
            applyTrump(suit);
        }

        function applyTrump(suit) {
            document.getElementById('overlay-pick-trump').style.display = 'none';
            document.getElementById('trump-val').innerText = suit;
            document.getElementById('status').innerText = "Trump Selected! Game Start.";
            // Add your card dealing logic here
        }
    </script>
</body>
</html>
