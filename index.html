<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Card Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a1a2e; --gold: #f1c40f; --red: #e94560; --blue: #0f3460; --green: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--primary); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { padding: 10px; background: #16213e; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); }
        .score-box { text-align: center; font-weight: bold; }
        .score-val { color: var(--gold); font-size: 1.2rem; display: block; }

        #game-container { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; }
        .hand-container { display: flex; justify-content: center; gap: 5px; min-height: 100px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; }

        #table-field { flex: 1; margin: 15px 0; border: 2px dashed var(--blue); border-radius: 15px; display: flex; justify-content: center; align-items: center; gap: 20px; }

        .card { width: 65px; height: 95px; background: white; border-radius: 6px; color: black; display: flex; flex-direction: column; justify-content: space-between; padding: 5px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card.red { color: var(--red); }
        .card.disabled { opacity: 0.4; pointer-events: none; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-suit { background: #fff; font-size: 1.5rem; width: 60px; height: 60px; border: 2px solid transparent; }
        .btn-suit.selected { border-color: var(--green); background: #e0ffe0; }

        .status-bar { background: var(--blue); font-size: 12px; text-align: center; padding: 4px; color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-box">P1 <span id="score-p1" class="score-val">0</span></div>
        <div id="trump-indicator" style="font-size: 1.5rem;">🃏</div>
        <div class="score-box">P2 <span id="score-p2" class="score-val">0</span></div>
    </div>

    <div class="status-bar" id="status-text">Initializing Secure Connection...</div>

    <div id="game-container">
        <div class="hand-container" id="opp-hand"></div>
        <div id="table-field">
            <div id="slot-p2"></div>
            <div id="slot-p1"></div>
        </div>
        <div class="hand-container" id="my-hand"></div>
    </div>

    <div id="sync-overlay" class="overlay">
        <h2 id="modal-title">Select Player</h2>
        <div id="player-select-btns">
            <button class="btn btn-gold" onclick="joinGame(1)">Player 1</button>
            <button class="btn btn-gold" onclick="joinGame(2)">Player 2</button>
        </div>

        <div id="trump-vote-section" style="display:none; text-align: center;">
            <p style="margin-bottom:15px;">Both players must choose the SAME Trump!</p>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-suit" onclick="castTrumpVote('♠')">♠</button>
                <button class="btn btn-suit" onclick="castTrumpVote('♣')">♣</button>
                <button class="btn btn-suit" onclick="castTrumpVote('♥')" style="color:red">♥</button>
                <button class="btn btn-suit" onclick="castTrumpVote('♦')" style="color:red">♦</button>
            </div>
            <p id="vote-feedback" style="margin-top:15px; font-size:14px; color:var(--gold);"></p>
        </div>
    </div>

    <script>
        // FIXED SUPABASE INITIALIZATION
        const supabaseUrl = 'https://pftbngrjxxkasossvhwm.supabase.co';
        const supabaseKey = 'sb_publishable_EmdkxXEgX5XYcvPnKZjdMA_Ff8G9PdC';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let myPlayerID = null;
        let gameState = {
            votes: { P1: null, P2: null },
            activeTrump: null,
            currentTurn: 'P1'
        };

        const channel = client.channel('card-table-01');

        function joinGame(num) {
            myPlayerID = `P${num}`;
            document.getElementById('player-select-btns').style.display = 'none';
            document.getElementById('trump-vote-section').style.display = 'block';
            document.getElementById('modal-title').innerText = `Player ${num}: Choose Trump`;
            
            // Listen for sync events
            channel.on('broadcast', { event: 'sync_vote' }, ({ payload }) => {
                gameState.votes[payload.player] = payload.suit;
                updateVoteUI();
            }).subscribe();
        }

        function castTrumpVote(suit) {
            gameState.votes[myPlayerID] = suit;
            channel.send({
                type: 'broadcast',
                event: 'sync_vote',
                payload: { player: myPlayerID, suit: suit }
            });
            updateVoteUI();
        }

        function updateVoteUI() {
            const v1 = gameState.votes.P1;
            const v2 = gameState.votes.P2;
            
            let statusText = "";
            if (v1 && !v2) statusText = "Waiting for Player 2...";
            if (!v1 && v2) statusText = "Waiting for Player 1...";
            
            if (v1 && v2) {
                if (v1 === v2) {
                    statusText = "Agreement Found! Starting...";
                    gameState.activeTrump = v1;
                    setTimeout(beginPlay, 1000);
                } else {
                    statusText = "Suits Mismatch! Pick again.";
                    gameState.votes = { P1: null, P2: null };
                }
            }
            document.getElementById('vote-feedback').innerText = statusText;
        }

        function beginPlay() {
            document.getElementById('sync-overlay').style.display = 'none';
            document.getElementById('trump-indicator').innerText = gameState.activeTrump;
            document.getElementById('status-text').innerText = `${gameState.currentTurn}'s turn to play`;
        }

        function updateStatusBar(msg) {
            document.getElementById('status-text').innerText = msg;
        }

        // Mobile touch fixes
        document.addEventListener('gesturestart', (e) => e.preventDefault());
    </script>
</body>
</html>
