<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Multiplayer Card Game</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
    --bg:#111827;
    --panel:#1f2937;
    --gold:#facc15;
    --green:#22c55e;
    --blue:#3b82f6;
    --red:#ef4444;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:var(--bg);
    color:white;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.top{
    background:#000;
    padding:15px;
    text-align:center;
    border-bottom:2px solid var(--blue);
}

h1{
    font-size:22px;
}

#roomInfo{
    margin-top:8px;
    color:var(--gold);
}

.controls{
    padding:15px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    background:var(--panel);
}

input{
    padding:10px;
    border:none;
    border-radius:6px;
    width:180px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.create{
    background:var(--green);
    color:white;
}

.join{
    background:var(--blue);
    color:white;
}

.start{
    background:var(--gold);
    color:black;
}

#status{
    text-align:center;
    padding:10px;
    background:#0f172a;
    color:var(--gold);
    font-weight:bold;
}

.board{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:10px;
}

.hand{
    min-height:130px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    padding:10px;
}

.table{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
}

.slot{
    width:90px;
    height:130px;
    border:2px dashed rgba(255,255,255,0.2);
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:80px;
    height:120px;
    background:white;
    border-radius:10px;
    padding:8px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    font-weight:bold;
    color:black;
    cursor:pointer;
}

.red{
    color:red;
}

.center{
    text-align:center;
    font-size:28px;
}

.bottom{
    transform:rotate(180deg);
}

.disabled{
    opacity:0.4;
    pointer-events:none;
}

.scoreboard{
    display:flex;
    justify-content:space-around;
    padding:10px;
    background:#000;
}

.score{
    text-align:center;
}

.score span{
    color:var(--gold);
    font-size:24px;
    display:block;
}
</style>
</head>

<body>

<div class="top">
    <h1>Realtime Multiplayer Card Game</h1>
    <div id="roomInfo">No Room Connected</div>
</div>

<div class="controls">
    <input type="text" id="roomInput" placeholder="Enter Room ID">

    <button class="create" onclick="createRoom()">
        Create Room
    </button>

    <button class="join" onclick="joinRoom()">
        Join Room
    </button>

    <button class="start" onclick="startGame()">
        Start Match
    </button>
</div>

<div id="status">
    Waiting for room...
</div>

<div class="scoreboard">
    <div class="score">
        Player 1
        <span id="score1">0</span>
    </div>

    <div class="score">
        Trump
        <span id="trump">🃏</span>
    </div>

    <div class="score">
        Player 2
        <span id="score2">0</span>
    </div>
</div>

<div class="board">

    <div class="hand" id="opponentHand"></div>

    <div class="table">
        <div class="slot" id="p2Slot"></div>
        <div class="slot" id="p1Slot"></div>
    </div>

    <div class="hand" id="myHand"></div>

</div>

<script>

const supabaseUrl =
'https://pftbngrjxxkasossvhwm.supabase.co';

const supabaseKey =
'sb_publishable_EmdkxXEgX5XYcvPnKZjdMA_Ff8G9PdC';

const client =
window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

let roomId = null;
let myPlayer = null;
let realtimeChannel = null;

const suits = [
    {symbol:'♠',color:'black'},
    {symbol:'♣',color:'black'},
    {symbol:'♥',color:'red'},
    {symbol:'♦',color:'red'}
];

const values =
['7','8','9','10','J','Q','K','A'];

let gameState = {
    player1: [],
    player2: [],
    table: {
        P1:null,
        P2:null
    },
    scores: {
        P1:0,
        P2:0
    },
    turn: 'P1',
    trump:'♠'
};

async function createRoom(){

    roomId =
    document.getElementById(
        "roomInput"
    ).value.trim();

    if(!roomId){
        alert("Enter room ID");
        return;
    }

    myPlayer = 'P1';

    const {error} =
    await client
    .from('game_rooms')
    .insert({
        id: roomId,
        game_state: gameState
    });

    if(error){
        alert("Room already exists");
        return;
    }

    connectRealtime();

    document.getElementById(
        "roomInfo"
    ).innerText =
    "Room: " + roomId +
    " | You are Player 1";

    updateStatus(
        "Waiting for Player 2"
    );

}

async function joinRoom(){

    roomId =
    document.getElementById(
        "roomInput"
    ).value.trim();

    if(!roomId){
        alert("Enter room ID");
        return;
    }

    const {data,error} =
    await client
    .from('game_rooms')
    .select("*")
    .eq("id",roomId)
    .single();

    if(error || !data){
        alert("Room not found");
        return;
    }

    gameState = data.game_state;

    myPlayer = 'P2';

    connectRealtime();

    render();

    document.getElementById(
        "roomInfo"
    ).innerText =
    "Room: " + roomId +
    " | You are Player 2";

    updateStatus(
        "Connected Successfully"
    );

}

function connectRealtime(){

    realtimeChannel =
    client.channel(
        'room-' + roomId
    );

    realtimeChannel

    .on(
        'postgres_changes',
        {
            event:'UPDATE',
            schema:'public',
            table:'game_rooms',
            filter:'id=eq.' + roomId
        },

        payload=>{

            gameState =
            payload.new.game_state;

            render();

        }
    )

    .subscribe();

}

function generateDeck(){

    let deck = [];

    suits.forEach(s=>{

        values.forEach(v=>{

            deck.push({
                val:v,
                suit:s.symbol,
                color:s.color
            });

        });

    });

    for(
        let i=deck.length-1;
        i>0;
        i--
    ){

        const j =
        Math.floor(
            Math.random()*(i+1)
        );

        [deck[i],deck[j]] =
        [deck[j],deck[i]];
    }

    return deck;

}

async function startGame(){

    if(myPlayer !== 'P1'){
        alert(
            "Only Player 1 can start"
        );
        return;
    }

    let deck = generateDeck();

    gameState.player1 =
    deck.splice(0,8);

    gameState.player2 =
    deck.splice(0,8);

    gameState.table = {
        P1:null,
        P2:null
    };

    gameState.scores = {
        P1:0,
        P2:0
    };

    gameState.turn = 'P1';

    gameState.trump =
    suits[
        Math.floor(Math.random()*4)
    ].symbol;

    await saveGame();

}

async function playCard(index){

    if(gameState.turn !== myPlayer)
        return;

    let hand =
    myPlayer === 'P1'
    ? gameState.player1
    : gameState.player2;

    const played =
    hand.splice(index,1)[0];

    gameState.table[
        myPlayer
    ] = played;

    gameState.turn =
    myPlayer === 'P1'
    ? 'P2'
    : 'P1';

    if(
        gameState.table.P1 &&
        gameState.table.P2
    ){

        setTimeout(async()=>{

            finishRound();

            await saveGame();

        },1000);

    }

    await saveGame();

}

function finishRound(){

    const winner =
    Math.random()>0.5
    ? 'P1'
    : 'P2';

    gameState.scores[winner]++;

    gameState.turn = winner;

    gameState.table = {
        P1:null,
        P2:null
    };

    if(
        gameState.player1.length===0 &&
        gameState.player2.length===0
    ){

        let msg = "";

        if(
            gameState.scores.P1 >
            gameState.scores.P2
        ){

            msg =
            "Player 1 Wins";

        }else if(
            gameState.scores.P2 >
            gameState.scores.P1
        ){

            msg =
            "Player 2 Wins";

        }else{

            msg = "Match Draw";

        }

        updateStatus(msg);

    }

}

async function saveGame(){

    await client
    .from('game_rooms')
    .update({
        game_state:gameState
    })
    .eq('id',roomId);

}

function render(){

    renderHand();

    renderOpponent();

    renderTable();

    document.getElementById(
        "score1"
    ).innerText =
    gameState.scores.P1;

    document.getElementById(
        "score2"
    ).innerText =
    gameState.scores.P2;

    document.getElementById(
        "trump"
    ).innerText =
    gameState.trump;

    updateStatus(
        gameState.turn +
        "'s Turn"
    );

}

function renderHand(){

    const box =
    document.getElementById(
        "myHand"
    );

    box.innerHTML = "";

    const hand =
    myPlayer === 'P1'
    ? gameState.player1
    : gameState.player2;

    hand.forEach((card,index)=>{

        const div =
        createCard(card);

        if(
            gameState.turn !== myPlayer
        ){

            div.classList.add(
                "disabled"
            );

        }

        div.onclick =
        ()=>playCard(index);

        box.appendChild(div);

    });

}

function renderOpponent(){

    const box =
    document.getElementById(
        "opponentHand"
    );

    box.innerHTML = "";

    const hand =
    myPlayer === 'P1'
    ? gameState.player2
    : gameState.player1;

    hand.forEach(()=>{

        const div =
        document.createElement(
            "div"
        );

        div.className = "card";

        div.style.background =
        "#444";

        box.appendChild(div);

    });

}

function renderTable(){

    document.getElementById(
        "p1Slot"
    ).innerHTML = "";

    document.getElementById(
        "p2Slot"
    ).innerHTML = "";

    if(gameState.table.P1){

        document.getElementById(
            "p1Slot"
        ).appendChild(
            createCard(
                gameState.table.P1
            )
        );

    }

    if(gameState.table.P2){

        document.getElementById(
            "p2Slot"
        ).appendChild(
            createCard(
                gameState.table.P2
            )
        );

    }

}

function createCard(card){

    const div =
    document.createElement("div");

    div.className =
    "card " + card.color;

    div.innerHTML = `
        <div>${card.val}</div>

        <div class="center">
            ${card.suit}
        </div>

        <div class="bottom">
            ${card.val}
        </div>
    `;

    return div;

}

function updateStatus(text){

    document.getElementById(
        "status"
    ).innerText = text;

}

</script>

</body>
</html>
