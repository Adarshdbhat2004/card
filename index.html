<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Card Game</title>

<!-- SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#1a252f;
    color:white;
}

#setup-screen{
    position:fixed;
    inset:0;
    background:#1a252f;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.btn{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.btn-green{
    background:#2ecc71;
    color:white;
}

.btn-blue{
    background:#3498db;
    color:white;
}

#room-url-input{
    width:300px;
    padding:10px;
}

#main-container{
    display:flex;
    flex-direction:column;
    padding:10px;
}

.panel{
    background:#34495e;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.hand-container{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}

.card{
    width:60px;
    height:90px;
    background:white;
    color:black;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
    font-weight:bold;
}

.red{
    color:red;
}

.black{
    color:black;
}

#chat-messages{
    height:200px;
    overflow:auto;
    background:#2c3e50;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.msg{
    margin-bottom:8px;
}

#chat-input{
    width:80%;
    padding:10px;
}

#status-text{
    color:yellow;
    margin-top:10px;
}

#table{
    display:flex;
    justify-content:center;
    gap:40px;
    margin:20px 0;
}

.slot{
    width:70px;
    height:100px;
    border:2px dashed white;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="setup-screen">

    <h1>Multiplayer Card Game</h1>

    <button id="btn-create-room" class="btn btn-green">
        Create Room
    </button>

    <div id="share-link-box" style="display:none;">

        <input type="text" id="room-url-input" readonly>

        <button id="btn-copy-link" class="btn btn-blue">
            Copy Link
        </button>

    </div>

</div>

<div id="main-container">

    <div class="panel">
        <h3 id="status-text">Connecting...</h3>
    </div>

    <div class="panel">
        <h3>Your Cards</h3>
        <div id="my-hand" class="hand-container"></div>
    </div>

    <div id="table">

        <div>
            <h4>Opponent</h4>
            <div class="slot" id="opp-slot"></div>
        </div>

        <div>
            <h4>You</h4>
            <div class="slot" id="my-slot"></div>
        </div>

    </div>

    <div class="panel">

        <h3>Chat</h3>

        <div id="chat-messages"></div>

        <div style="margin-top:10px;">
            <input type="text" id="chat-input">
            <button id="chat-send" class="btn btn-blue">
                Send
            </button>
        </div>

    </div>

</div>

<script>

/* =========================
   SUPABASE CONNECTION
========================= */

const SUPABASE_URL =
"https://pftbngrjxxkasossvhwm.supabase.co";

const SUPABASE_KEY =
"sb_publishable_EmdkxXEgX5XYcvPnKZjdMA_Ff8G9PdC";

const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

console.log("Supabase Connected");

/* =========================
   GAME VARIABLES
========================= */

const suits = ['♠','♣','♥','♦'];
const values = ['7','8','9','10','J','Q','K','A'];

let roomID =
new URLSearchParams(window.location.search).get('room');

let myRole = '';
let channel = null;

let myHand = [];

let currentTurn = null;

let tableCards = {
    P1:null,
    P2:null
};

/* =========================
   PAGE LOAD
========================= */

window.addEventListener('DOMContentLoaded',()=>{

    if(roomID){

        myRole='P2';

        document.getElementById('btn-create-room').style.display='none';

        initRealtimeEngine();

    }

    else{

        document.getElementById('btn-create-room')
        .addEventListener('click',generateRoom);

    }

    document.getElementById('btn-copy-link')
    .addEventListener('click',copyRoomLink);

    document.getElementById('chat-send')
    .addEventListener('click',sendChat);

});

/* =========================
   CREATE ROOM
========================= */

function generateRoom(){

    roomID=Math.random().toString(36).substring(2,9);

    myRole='P1';

    const link=
    window.location.origin+
    window.location.pathname+
    '?room='+roomID;

    document.getElementById('room-url-input').value=link;

    document.getElementById('share-link-box').style.display='block';

    initRealtimeEngine();

}

/* =========================
   COPY LINK
========================= */

function copyRoomLink(){

    const input=document.getElementById('room-url-input');

    input.select();

    document.execCommand('copy');

    alert("Copied");

}

/* =========================
   REALTIME ENGINE
========================= */

function initRealtimeEngine(){

    channel=client.channel(`room-${roomID}`);

    channel

    .on('broadcast',{event:'join'},()=>{

        if(myRole==='P1'){

            document.getElementById('setup-screen').style.display='none';

            startGame();

        }

    })

    .on('broadcast',{event:'deal'},({payload})=>{

        myHand=payload.hand;

        renderHand();

        document.getElementById('setup-screen').style.display='none';

    })

    .on('broadcast',{event:'play-card'},({payload})=>{

        if(payload.player!==myRole){

            tableCards[payload.player]=payload.card;

            renderTable();

        }

    })

    .on('broadcast',{event:'chat'},({payload})=>{

        addChat(payload.name,payload.msg);

    })

    .subscribe((status)=>{

        console.log(status);

        if(status==='SUBSCRIBED'){

            document.getElementById('status-text')
            .innerText="Connected";

            if(myRole==='P2'){

                channel.send({
                    type:'broadcast',
                    event:'join',
                    payload:{}
                });

            }

        }

    });

}

/* =========================
   START GAME
========================= */

function startGame(){

    const deck=[];

    suits.forEach(s=>{
        values.forEach(v=>{
            deck.push({
                value:v,
                suit:s,
                color:(s==='♥'||s==='♦')?'red':'black'
            });
        });
    });

    deck.sort(()=>Math.random()-0.5);

    const p1Hand=deck.slice(0,5);
    const p2Hand=deck.slice(5,10);

    myHand=p1Hand;

    renderHand();

    channel.send({
        type:'broadcast',
        event:'deal',
        payload:{
            hand:p2Hand
        }
    });

}

/* =========================
   RENDER HAND
========================= */

function renderHand(){

    const container=document.getElementById('my-hand');

    container.innerHTML='';

    myHand.forEach((card,index)=>{

        const div=document.createElement('div');

        div.className=`card ${card.color}`;

        div.innerHTML=`${card.value}${card.suit}`;

        div.onclick=()=>playCard(index);

        container.appendChild(div);

    });

}

/* =========================
   PLAY CARD
========================= */

function playCard(index){

    const card=myHand.splice(index,1)[0];

    tableCards[myRole]=card;

    renderHand();

    renderTable();

    channel.send({
        type:'broadcast',
        event:'play-card',
        payload:{
            player:myRole,
            card:card
        }
    });

}

/* =========================
   RENDER TABLE
========================= */

function renderTable(){

    document.getElementById('my-slot').innerHTML='';

    document.getElementById('opp-slot').innerHTML='';

    if(tableCards[myRole]){

        const div=document.createElement('div');

        div.className=`card ${tableCards[myRole].color}`;

        div.innerHTML=
        `${tableCards[myRole].value}${tableCards[myRole].suit}`;

        document.getElementById('my-slot').appendChild(div);

    }

    const oppRole=myRole==='P1'?'P2':'P1';

    if(tableCards[oppRole]){

        const div=document.createElement('div');

        div.className=`card ${tableCards[oppRole].color}`;

        div.innerHTML=
        `${tableCards[oppRole].value}${tableCards[oppRole].suit}`;

        document.getElementById('opp-slot').appendChild(div);

    }

}

/* =========================
   CHAT
========================= */

function sendChat(){

    const input=document.getElementById('chat-input');

    const msg=input.value.trim();

    if(!msg)return;

    addChat('You',msg);

    channel.send({
        type:'broadcast',
        event:'chat',
        payload:{
            name:myRole,
            msg:msg
        }
    });

    input.value='';

}

function addChat(name,msg){

    const div=document.createElement('div');

    div.className='msg';

    div.innerHTML=`<b>${name}:</b> ${msg}`;

    document.getElementById('chat-messages')
    .appendChild(div);

}

</script>

</body>
</html>
