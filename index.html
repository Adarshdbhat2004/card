<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tulasi Card Game - Online</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a1a2e; --gold: #f1c40f; --red: #e94560; --blue: #0f3460; --green: #2ecc71; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { background: var(--primary); color: var(--white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Mobile Header */
        .header { padding: 10px; background: #16213e; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); }
        .score-box { text-align: center; }
        .score-val { color: var(--gold); font-size: 1.2rem; font-weight: bold; display: block; }

        /* Game Board */
        #game-board { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; position: relative; }
        .hand-container { display: flex; justify-content: center; gap: 4px; min-height: 95px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 12px; }
        
        #battle-field { flex: 1; margin: 10px 0; border: 2px dashed #4f5d73; border-radius: 15px; display: flex; justify-content: center; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); }

        /* Card Styling */
        .card { width: 62px; height: 90px; background: white; border-radius: 6px; color: black; display: flex; flex-direction: column; justify-content: space-between; padding: 5px; font-weight: bold; font-size: 14px; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .card.red { color: var(--red); }
        .card.disabled { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .card .suit-center { font-size: 24px; text-align: center; }

        /* Chat System */
        #chat-panel { position: fixed; bottom: 110px; right: 10px; width: 250px; height: 300px; background: #16213e; border: 2px solid var(--blue); border-radius: 10px; display: none; flex-direction: column; z-index: 100; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        #chat-input-area { display: flex; padding: 5px; border-top: 1px solid var(--blue); }
        #chat-input { flex: 1; background: transparent; border: none; color: white; padding: 5px; }
        .chat-toggle { position: fixed; bottom: 110px; left: 10px; background: var(--blue); padding: 10px; border-radius: 50%; z-index: 101; border: none; color: white; cursor: pointer; }

        /* Overlays */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 5px; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-suit { background: white; color: black; width: 60px; height: 60px; font-size: 1.5rem; }
        
        .active-turn { border: 2px solid var(--gold); box-shadow: 0 0 10px var(--gold); }
        .status-strip { background: var(--blue); color: var(--gold); text-align: center; font-size: 12px; padding: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-box">P1 <span id="score-p1" class="score-val">0</span></div>
        <div id="trump-icon" style="font-size: 1.8rem;">🃏</div>
        <div class="score-box">P2 <span id="score-p2" class="score-val">0</span></div>
    </div>

    <div class="status-strip" id="status-msg">Connecting to Server...</div>

    <div id="game-board">
        <div class="hand-container" id="opp-hand"></div>
        <div id="battle-field">
            <div id="slot-p2" class="play-slot"></div>
            <div id="slot-p1" class="play-slot"></div>
        </div>
        <div class="hand-container" id="my-hand"></div>
    </div>

    <button class="chat-toggle" onclick="toggleChat()">💬</button>
    <div id="chat-panel">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type message...">
            <button onclick="sendChatMessage()" style="background:transparent; border:none; color:var(--gold); font-weight:bold;">SEND</button>
        </div>
    </div>

    <div id="setup-overlay" class="overlay">
        <div id="step-1">
            <h2>Welcome to Tulasi Games</h2>
            <p>Select your side:</p>
            <button class="btn btn-gold" onclick="setPlayer(1)">Player 1</button>
            <button class="btn btn-gold" onclick="setPlayer(2)">Player 2</button>
        </div>
        <div id="step-2" style="display:none;">
            <h2>Agreement Phase</h2>
            <p>Both players must pick the same Trump Suit to start!</p>
            <div style="display:flex; gap:10px; margin: 20px 0;">
                <button class="btn btn-suit" onclick="voteTrump('♠')">♠</button>
                <button class="btn btn-suit" onclick="voteTrump('♣')">♣</button>
                <button class="btn btn-suit" onclick="voteTrump('♥')" style="color:red">♥</button>
                <button class="btn btn-suit" onclick="voteTrump('♦')" style="color:red">♦</button>
            </div>
            <p id="agreement-status" style="color:var(--gold);"></p>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://pftbngrjxxkasossvhwm.supabase.co';
        const supabaseKey = 'sb_publishable_EmdkxXEgX5XYcvPnKZjdMA_Ff8G9PdC';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let myRole = null;
        let votes = { P1: null, P2: null };
        const channel = client.channel('room_1');

        // SETUP & SYNC
        function setPlayer(num) {
            myRole = `P${num}`;
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            
            channel.on('broadcast', { event: 'trump_vote' }, ({ payload }) => {
                votes[payload.player] = payload.suit;
                checkAgreement();
            }).on('broadcast', { event: 'chat' }, ({ payload }) => {
                appendChat(payload.sender, payload.msg);
            }).subscribe();
        }

        function voteTrump(suit) {
            votes[myRole] = suit;
            channel.send({ type: 'broadcast', event: 'trump_vote', payload: { player: myRole, suit: suit }});
            checkAgreement();
        }

        function checkAgreement() {
            const status = document.getElementById('agreement-status');
            if (votes.P1 && votes.P2) {
                if (votes.P1 === votes.P2) {
                    status.innerText = "Agreed! Starting Match...";
                    setTimeout(initGame, 1000);
                } else {
                    status.innerText = "Mismatch! Both must click the same suit.";
                    votes = { P1: null, P2: null };
                }
            } else {
                status.innerText = votes.P1 || votes.P2 ? "Waiting for opponent choice..." : "";
            }
        }

        function initGame() {
            document.getElementById('setup-overlay').style.display = 'none';
            document.getElementById('trump-icon').innerText = votes.P1;
            document.getElementById('status-msg').innerText = "Game Started - P1's Turn";
            // Game logic follows...
        }

        // CHAT LOGIC
        function toggleChat() {
            const p = document.getElementById('chat-panel');
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            channel.send({ type: 'broadcast', event: 'chat', payload: { sender: myRole, msg: input.value }});
            appendChat('Me', input.value);
            input.value = '';
        }

        function appendChat(sender, msg) {
            const box = document.getElementById('chat-messages');
            box.innerHTML += `<div><strong>${sender}:</strong> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // MOBILE PREVENT ZOOM
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
