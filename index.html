<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Multiplayer Card Game</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
    --bg:#111827;
    --panel:#1f2937;
    --gold:#facc15;
    --green:#22c55e;
    --red:#ef4444;
    --blue:#3b82f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:var(--bg);
    color:white;
    min-height:100vh;
    padding:15px;
}

.top-panel{
    background:var(--panel);
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
}

input{
    padding:10px;
    border:none;
    border-radius:6px;
    width:200px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.btn-green{
    background:var(--green);
    color:white;
}

.btn-blue{
    background:var(--blue);
    color:white;
}

.status{
    margin-top:10px;
    color:var(--gold);
    font-weight:bold;
}

.board{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.player-box{
    background:var(--panel);
    padding:15px;
    border-radius:10px;
}

.hand{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:10px;
}

.card{
    width:70px;
    height:100px;
    background:white;
    border-radius:8px;
    color:black;
    padding:5px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    font-weight:bold;
    cursor:pointer;
}

.red{
    color:red;
}

.black{
    color:black;
}

.center{
    font-size:28px;
    text-align:center;
}

.table{
    background:var(--panel);
    padding:20px;
    border-radius:10px;
    display:flex;
    justify-content:center;
    gap:40px;
    min-height:150px;
}

.slot{
    width:90px;
    height:120px;
    border:2px dashed #555;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.scoreboard{
    display:flex;
    justify-content:space-around;
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="top-panel">

    <h2>ONLINE MULTIPLAYER CARD GAME</h2>

    <br>

    <input type="text" id="room-id" placeholder="Enter Room ID">

    <button class="btn-green" onclick="createRoom()">
        Create Room
    </button>

    <button class="btn-blue" onclick="joinRoom()">
        Join Room
    </button>

    <br><br>

    <button onclick="choosePlayer('P1')">
        Join As Player 1
    </button>

    <button onclick="choosePlayer('P2')">
        Join As Player 2
    </button>

    <br><br>

    <button class="btn-green" onclick="startGame()">
        Start Game
    </button>

    <div class="status" id="status">
        Waiting...
    </div>

    <div class="scoreboard">
        <div>P1 Score: <span id="p1-score">0</span></div>
        <div>Turn: <span id="turn-text">-</span></div>
        <div>P2 Score: <span id="p2-score">0</span></div>
    </div>

</div>

<div class="board">

    <div class="player-box">
        <h3>Player 2 Hand</h3>
        <div class="hand" id="p2-hand"></div>
    </div>

    <div class="table">

        <div>
            <h4>P2 Card</h4>
            <div class="slot" id="p2-slot"></div>
        </div>

        <div>
            <h4>P1 Card</h4>
            <div class="slot" id="p1-slot"></div>
        </div>

    </div>

    <div class="player-box">
        <h3>Player 1 Hand</h3>
        <div class="hand" id="p1-hand"></div>
    </div>

</div>

<script>

// ===========================
// SUPABASE
// ===========================

const supabaseUrl =
"https://pftbngrjxxkasossvhwm.supabase.co";

const supabaseKey =
"sb_publishable_EmdkxXEgX5XYcvPnKZjdMA_Ff8G9PdC";

const client = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

// ===========================
// VARIABLES
// ===========================

let roomId = null;
let myPlayer = null;
let deck = [];

let gameState = {
    player1Hand: [],
    player2Hand: [],
    tableCards:{
        P1:null,
        P2:null
    },
    currentTurn:"P1",
    scores:{
        P1:0,
        P2:0
    }
};

// ===========================
// CREATE ROOM
// ===========================

async function createRoom(){

    roomId =
        document.getElementById("room-id")
        .value.trim();

    if(!roomId){
        alert("Enter Room ID");
        return;
    }

    const { data } = await client
        .from("game_rooms")
        .select("*")
        .eq("id", roomId)
        .single();

    if(data){
        alert("Room already exists");
        return;
    }

    await client
        .from("game_rooms")
        .insert({
            id:roomId,
            game_state:gameState
        });

    subscribeRoom();

    updateStatus("Room Created");
}

// ===========================
// JOIN ROOM
// ===========================

async function joinRoom(){

    roomId =
        document.getElementById("room-id")
        .value.trim();

    if(!roomId){
        alert("Enter Room ID");
        return;
    }

    const { data } = await client
        .from("game_rooms")
        .select("*")
        .eq("id", roomId)
        .single();

    if(!data){
        alert("Room Not Found");
        return;
    }

    gameState = data.game_state;

    subscribeRoom();

    renderEverything();

    updateStatus("Joined Room");
}

// ===========================
// CHOOSE PLAYER
// ===========================

function choosePlayer(player){

    myPlayer = player;

    updateStatus("You joined as " + player);
}

// ===========================
// REALTIME
// ===========================

function subscribeRoom(){

    client.channel("room-"+roomId)

    .on(
        "postgres_changes",
        {
            event:"UPDATE",
            schema:"public",
            table:"game_rooms",
            filter:`id=eq.${roomId}`
        },

        payload => {

            gameState =
                payload.new.game_state;

            renderEverything();
        }
    )

    .subscribe();
}

// ===========================
// SAVE GAME
// ===========================

async function saveGame(){

    await client
        .from("game_rooms")
        .update({
            game_state:gameState
        })
        .eq("id", roomId);
}

// ===========================
// START GAME
// ===========================

async function startGame(){

    generateDeck();

    gameState.player1Hand =
        deck.splice(0,8);

    gameState.player2Hand =
        deck.splice(0,8);

    gameState.currentTurn = "P1";

    gameState.tableCards = {
        P1:null,
        P2:null
    };

    gameState.scores = {
        P1:0,
        P2:0
    };

    await saveGame();

    renderEverything();

    updateStatus("Game Started");
}

// ===========================
// GENERATE DECK
// ===========================

function generateDeck(){

    const suits = [
        {symbol:"♠",color:"black"},
        {symbol:"♣",color:"black"},
        {symbol:"♥",color:"red"},
        {symbol:"♦",color:"red"}
    ];

    const values = [
        "7","8","9","10",
        "J","Q","K","A"
    ];

    deck = [];

    suits.forEach(s=>{

        values.forEach(v=>{

            deck.push({
                val:v,
                suit:s.symbol,
                color:s.color
            });

        });

    });

    for(let i=deck.length-1;i>0;i--){

        const j =
            Math.floor(
                Math.random()*(i+1)
            );

        [deck[i],deck[j]] =
        [deck[j],deck[i]];
    }
}

// ===========================
// PLAY CARD
// ===========================

async function playCard(index){

    if(myPlayer !== gameState.currentTurn){
        return;
    }

    let hand =
        myPlayer==="P1"
        ? gameState.player1Hand
        : gameState.player2Hand;

    const played =
        hand.splice(index,1)[0];

    gameState.tableCards[myPlayer] =
        played;

    gameState.currentTurn =
        myPlayer==="P1"
        ? "P2"
        : "P1";

    if(
        gameState.tableCards.P1 &&
        gameState.tableCards.P2
    ){

        setTimeout(()=>{
            decideWinner();
        },500);
    }

    await saveGame();

    renderEverything();
}

// ===========================
// DECIDE WINNER
// ===========================

async function decideWinner(){

    const valuesRank = {
        "7":1,
        "8":2,
        "9":3,
        "10":4,
        "J":5,
        "Q":6,
        "K":7,
        "A":8
    };

    const p1 =
        gameState.tableCards.P1;

    const p2 =
        gameState.tableCards.P2;

    let winner = null;

    if(
        valuesRank[p1.val] >
        valuesRank[p2.val]
    ){
        winner = "P1";
    }else{
        winner = "P2";
    }

    gameState.scores[winner]++;

    gameState.currentTurn = winner;

    gameState.tableCards = {
        P1:null,
        P2:null
    };

    await saveGame();

    renderEverything();

    updateStatus(
        winner + " won this round"
    );
}

// ===========================
// RENDER
// ===========================

function renderEverything(){

    renderHand(
        "p1-hand",
        gameState.player1Hand,
        "P1"
    );

    renderHand(
        "p2-hand",
        gameState.player2Hand,
        "P2"
    );

    renderTable();

    document.getElementById(
        "p1-score"
    ).innerText =
    gameState.scores.P1;

    document.getElementById(
        "p2-score"
    ).innerText =
    gameState.scores.P2;

    document.getElementById(
        "turn-text"
    ).innerText =
    gameState.currentTurn;
}

// ===========================
// RENDER HAND
// ===========================

function renderHand(
    containerId,
    hand,
    player
){

    const box =
        document.getElementById(
            containerId
        );

    box.innerHTML = "";

    hand.forEach((card,index)=>{

        const div =
            createCard(card);

        if(player===myPlayer){

            div.onclick = ()=>{
                playCard(index);
            };
        }

        box.appendChild(div);
    });
}

// ===========================
// CREATE CARD
// ===========================

function createCard(card){

    const div =
        document.createElement("div");

    div.className =
        "card " + card.color;

    div.innerHTML = `
        <div>${card.val}</div>
        <div class="center">
            ${card.suit}
        </div>
        <div style="transform:rotate(180deg)">
            ${card.val}
        </div>
    `;

    return div;
}

// ===========================
// TABLE
// ===========================

function renderTable(){

    document.getElementById(
        "p1-slot"
    ).innerHTML = "";

    document.getElementById(
        "p2-slot"
    ).innerHTML = "";

    if(gameState.tableCards.P1){

        document.getElementById(
            "p1-slot"
        ).appendChild(
            createCard(
                gameState.tableCards.P1
            )
        );
    }

    if(gameState.tableCards.P2){

        document.getElementById(
            "p2-slot"
        ).appendChild(
            createCard(
                gameState.tableCards.P2
            )
        );
    }
}

// ===========================
// STATUS
// ===========================

function updateStatus(msg){

    document.getElementById(
        "status"
    ).innerText = msg;
}

</script>

</body>
</html>
